<!DOCTYPE html>
<html>

<head>
    <title>My Store</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 15px 20px;
            color: white;
        }

        /* SEARCH */
        .search-box {
            display: flex;
        }

        .search {
            width: 300px;
            padding: 10px;
            border: 1px solid #ccc;
            border-right: none;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        .search-btn {
            padding: 10px;
            border: 1px solid #ccc;
            background: #febd69;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 15px;
            list-style: none;
            align-items: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .cart-count {
            background: red;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            margin-left: 5px;
        }

        /* PRODUCTS */
        .products {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 150px;
            border-radius: 10px;
            text-align: center;
        }

        button {
            padding: 6px 10px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* POPUPS */
        .popup {
            position: fixed;
            right: 20px;
            top: 70px;
            width: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            display: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2>My Store</h2>

        <div class="search-box">
            <input type="text" placeholder="Search..." class="search">
            <button class="search-btn">🔍</button>
        </div>

        <ul class="menu">
            <li><a href="#">Home</a></li>

            <li><a onclick="toggleCategories()">Categories</a></li>

            <li>
                <a onclick="toggleCart()">Cart 🛒</a>
                <span id="cart-count" class="cart-count">0</span>
            </li>
        </ul>
    </nav>

    <!-- PRODUCTS -->
    <div class="products">
        <div class="card">
            <h3>Chocolate</h3>
            <p>$5</p>
            <button onclick="addToCart('Chocolate')">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Chips</h3>
            <p>$3</p>
            <button onclick="addToCart('Chips')">Add to Cart</button>
        </div>
    </div>

    <!-- 🛒 CART POPUP -->
    <div id="cart-popup" class="popup">
        <h3>Your Cart</h3>
        <ul id="cart-items"></ul>
        <button class="close-btn" onclick="toggleCart()">Close</button>
    </div>

    <!-- 📂 CATEGORIES POPUP -->
    <div id="categories-popup" class="popup">
        <h3>Categories</h3>
        <ul>
            <li><a href="category.html?name=Snacks">Snacks</a></li>
            <li><a href="category.html?name=Drinks">Drinks</a></li>
            <li><a href="category.html?name=Chocolates">Chocolates</a></li>
        </ul>
        <button class="close-btn" onclick="toggleCategories()">Close</button>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        let cart = [];

        function addToCart(item) {
            cart.push(item);
            document.getElementById("cart-count").innerText = cart.length;

            let list = document.getElementById("cart-items");
            let li = document.createElement("li");
            li.innerText = item;
            list.appendChild(li);
        }

        function toggleCart() {
            let cartPopup = document.getElementById("cart-popup");
            let catPopup = document.getElementById("categories-popup");

            catPopup.style.display = "none";

            cartPopup.style.display =
                cartPopup.style.display === "block" ? "none" : "block";
        }

        function toggleCategories() {
            let cartPopup = document.getElementById("cart-popup");
            let catPopup = document.getElementById("categories-popup");

            cartPopup.style.display = "none";

            catPopup.style.display =
                catPopup.style.display === "block" ? "none" : "block";
        }
    </script>

</body>

</html>
