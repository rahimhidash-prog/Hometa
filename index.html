<!DOCTYPE html>
<html>

<head>
    <title>Hometa</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 15px 20px;
            color: white;
        }

        .logo img {
            height: 40px;
        }

        /* SEARCH */
        .search-box {
            display: flex;
        }

        .search {
            width: 300px;
            padding: 10px;
            border: 1px solid #ccc;
            border-right: none;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        .search-btn {
            padding: 10px;
            border: 1px solid #ccc;
            background: #febd69;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 15px;
            list-style: none;
            align-items: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .cart-count {
            background: red;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            margin-left: 5px;
        }

        /* PRODUCTS */
        .products {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            padding: 8px 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* POPUP BASE */
        .popup {
            position: fixed;
            right: 20px;
            top: 70px;
            width: 260px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            background: red;
            color: white;
            padding: 6px 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 🔥 CATEGORY GRID */
        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .category-card {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: black;
            font-weight: 500;
            transition: 0.2s;
        }

        .category-card:hover {
            background: #111;
            color: white;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/logo.png">
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search..." class="search" id="search-input">
            <button class="search-btn">🔍</button>
        </div>

        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a onclick="toggleCategories()">Categories</a></li>
            <li>
                <a onclick="toggleCart()">Cart 🛒</a>
                <span id="cart-count" class="cart-count">0</span>
            </li>
        </ul>
    </nav>

    <!-- PRODUCTS -->
    <div class="products">

        <div class="card">
            <img src="images/container.jpg">
            <h3 class="product-name">Storage Container</h3>
            <p>₹199</p>
            <button onclick="addToCart('Storage Container', 199)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/knife.jpg">
            <h3 class="product-name">Knife Set</h3>
            <p>₹299</p>
            <button onclick="addToCart('Knife Set', 299)">Add to Cart</button>
        </div>

    </div>

    <!-- CART POPUP -->
    <div id="cart-popup" class="popup">
        <h3>Your Cart</h3>
        <ul id="cart-items"></ul>
        <p id="total-price">Total: ₹0</p>
        <button class="close-btn" onclick="toggleCart()">Close</button>
    </div>

    <!-- 🔥 IMPROVED CATEGORY POPUP -->
    <div id="categories-popup" class="popup">
        <h3>Categories</h3>

        <div class="categories-grid">
            <a href="category.html?name=Kitchen" class="category-card">🍳 Kitchen</a>
            <a href="category.html?name=Bathroom" class="category-card">🚿 Bathroom</a>
            <a href="category.html?name=Cleaning" class="category-card">🧼 Cleaning</a>
            <a href="category.html?name=Storage" class="category-card">📦 Storage</a>
        </div>

        <button class="close-btn" onclick="toggleCategories()">Close</button>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function addToCart(name, price) {
            let item = cart.find(i => i.name === name);

            if (item) {
                item.quantity++;
            } else {
                cart.push({ name, price, quantity: 1 });
            }

            saveCart();
            updateCart();
        }

        function updateCart() {
            let list = document.getElementById("cart-items");
            list.innerHTML = "";

            let total = 0;

            cart.forEach(item => {
                let li = document.createElement("li");
                li.innerText = `${item.name} x${item.quantity}`;
                list.appendChild(li);
                total += item.price * item.quantity;
            });

            document.getElementById("cart-count").innerText = cart.length;
            document.getElementById("total-price").innerText = "Total: ₹" + total;
        }

        function toggleCart() {
            let cartPopup = document.getElementById("cart-popup");
            let catPopup = document.getElementById("categories-popup");

            catPopup.style.display = "none";
            cartPopup.style.display = cartPopup.style.display === "block" ? "none" : "block";
        }

        function toggleCategories() {
            let cartPopup = document.getElementById("cart-popup");
            let catPopup = document.getElementById("categories-popup");

            cartPopup.style.display = "none";
            catPopup.style.display = catPopup.style.display === "block" ? "none" : "block";
        }

        document.getElementById("search-input").addEventListener("keyup", function () {
            let searchValue = this.value.toLowerCase();
            let cards = document.querySelectorAll(".card");

            cards.forEach(function (card) {
                let productName = card.querySelector(".product-name").innerText.toLowerCase();
                card.style.display = productName.includes(searchValue) ? "block" : "none";
            });
        });

        updateCart();
    </script>

</body>

</html>
