<!DOCTYPE html>
<html>

<head>
    <title>Bathroom Sink Organiser - Hometa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .product-page {
            display: flex;
            gap: 40px;
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        .product-image {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .product-image img {
            width: 100%;
            height: auto;
        }

        .product-details {
            flex: 1;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .price {
            color: #ff6600;
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .buy-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .qty {
            width: 60px;
            padding: 5px;
            margin-top: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-btn {
            background: #af8ada;
        }

        .buy-btn {
            background: #5224fa;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div style="background:#111;color:white;padding:15px;font-size:20px;">
        Hometa
    </div>

    <!-- PRODUCT PAGE -->
    <div class="product-page">

        <!-- LEFT IMAGE -->
        <div class="product-image">
            <img src="../images/bathroom-sink-organizer.png" alt="Bathroom Sink Organiser">
        </div>

        <!-- RIGHT DETAILS -->
        <div class="product-details">
            <h2>Bathroom Sink Organiser</h2>
            <div class="rating">★★★★★</div>
            <div class="price">₹531</div>

            <p>


                Hometa Premium Acrylic Bathroom Sink Organiser - Dark Gray | 55.5cm Wall-Mounted Heavy-Duty Storage Rack
                | No-Drill Adhesive & Suction Cup Shelf for Kitchen & Washbasin (Rustproof & unbreakable)
            </p>

            <div class="buy-box">
                <label>Quantity:</label><br>
                <input type="number" id="qty" value="1" min="1" class="qty">

                <button class="btn cart-btn" onclick="addToCart()">Add to Cart</button>
                <button class="btn buy-btn">Buy Now</button>
            </div>
        </div>

    </div>

    <script>
        document.body.style.opacity = "1";

        function addToCart() {
            let qty = parseInt(document.getElementById("qty").value);

            let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

            let item = cart.find(i => i.name === "Bathroom Sink Organiser");

            if (item) item.quantity += qty;
            else cart.push({ name: "Bathroom Sink Organiser", price: 531, quantity: qty });

            sessionStorage.setItem("cart", JSON.stringify(cart));

            alert("Added to cart!");
        }
    </script>

</body>

</html>
