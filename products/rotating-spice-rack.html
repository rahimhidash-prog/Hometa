<!DOCTYPE html>
<html>

<head>
    <title>Rotating Spice Rack - Hometa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .product-page {
            display: flex;
            gap: 40px;
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        .product-image {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .product-image img {
            width: 100%;
            height: auto;
        }

        .product-details {
            flex: 1;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .price {
            color: #ff6600;
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .buy-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .qty {
            width: 60px;
            padding: 5px;
            margin-top: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-btn {
            background: #a376d6;
        }

        .buy-btn {
            background: #5224fa;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Navbar -->

    <div id="navbar"></div>

    <script>
        fetch("../navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                // HIDE elements ONLY on this page
                document.getElementById("searchBar").style.display = "none";
                document.getElementById("categoriesLink").style.display = "none";
            });
    </script>
    <!-- PRODUCT PAGE -->
    <div class="product-page">

        <!-- LEFT IMAGE -->
        <div class="product-image">
            <img src="../images/rotating-spice-rack.png" alt="Rotating Spice Rack">
        </div>

        <!-- RIGHT DETAILS -->
        <div class="product-details">
            <h2>Rotating Spice Rack</h2>
            <div class="rating">★★★★★</div>
            <div class="price">₹800</div>

            <p>
                360° rotating spice rack designed for modern kitchens.
                Keeps your spices organized, easy to access, and stylish.
            </p>

            <div class="buy-box">
                <label>Quantity:</label><br>
                <input type="number" id="qty" value="1" min="1" class="qty">

                <button class="btn cart-btn" onclick="addToCart()">Add to Cart</button>
                <button class="btn buy-btn">Buy Now</button>
            </div>
        </div>

    </div>

    <script>
        document.body.style.opacity = "1";

        function addToCart() {
            let qty = parseInt(document.getElementById("qty").value);

            let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

            let item = cart.find(i => i.name === "Rotating Spice Rack");

            if (item) item.quantity += qty;
            else cart.push({ name: "Rotating Spice Rack", price: 800, quantity: qty });

            sessionStorage.setItem("cart", JSON.stringify(cart));

            alert("Added to cart!");
        }
    </script>

</body>

</html>
